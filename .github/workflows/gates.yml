name: Gates

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  gates:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Tracked-path gate (no forbidden private path is tracked)
        run: python3 scripts/check_public_tree.py

      - name: Scrub gate (no product-specific reference terms in copied tooling/docs)
        run: python3 scripts/scrub_check.py

      - name: Install gitleaks 8.30.0
        run: |
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v8.30.0/gitleaks_8.30.0_linux_x64.tar.gz -o /tmp/gitleaks.tgz
          tar -xzf /tmp/gitleaks.tgz -C /tmp gitleaks
          sudo install -m 0755 /tmp/gitleaks /usr/local/bin/gitleaks
          gitleaks version

      - name: Content gate (no private strings, tracked tree)
        run: bash scripts/gitleaks_tracked.sh
